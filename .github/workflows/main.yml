name: All-in-One Build Toolchain Store

on:
  workflow_dispatch:

jobs:
  # 任务 1：并行下载并上传到 Release
  download-and-release:
    strategy:
      matrix:
        include:
          - name: gnu-12
            urls: |
              https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--glibc--stable-2023.08-1.tar.bz2
              https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--glibc--stable-2023.08-1.tar.bz2
              https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--glibc--stable-2023.08-1.tar.bz2
          - name: gnu-13
            urls: |
              https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--glibc--bleeding-edge-2023.11-1.tar.bz2
              https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--glibc--bleeding-edge-2023.11-1.tar.bz2
              https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--glibc--bleeding-edge-2023.11-1.tar.bz2
          - name: musl-12
            urls: |
              https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--musl--stable-2023.08-1.tar.bz2
              https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--stable-2023.08-1.tar.bz2
              https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--musl--stable-2023.08-1.tar.bz2
          - name: musl-13
            urls: |
              https://toolchains.bootlin.com/downloads/releases/toolchains/x86-64/tarballs/x86-64--musl--bleeding-edge-2023.11-1.tar.bz2
              https://toolchains.bootlin.com/downloads/releases/toolchains/aarch64/tarballs/aarch64--musl--bleeding-edge-2023.11-1.tar.bz2
              https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--musl--bleeding-edge-2023.11-1.tar.bz2
          - name: synology
            urls: |
              https://global.synologydownload.com/download/ToolChain/toolchain/7.1-42661/Realtek%20RTD129x%20Linux%204.4.180/rtd1296-gcc850_glibc226_armv8-GPL.txz
              https://global.synologydownload.com/download/ToolChain/toolchain/7.1-42661/Intel%20x86%20Linux%204.4.180%20%28GeminiLake%29/geminilake-gcc850_glibc226_x86_64-GPL.txz

    runs-on: ubuntu-latest
    steps:
      - name: Download Files
        run: |
          mkdir -p artifacts
          cd artifacts
          # 动态匹配包名后缀
          for url in ${{ matrix.urls }}; do
            ext=".tar.bz2"
            [[ "$url" == *.txz ]] && ext=".txz"
            # 根据 URL 包含的关键词和 matrix 名拼接最终包名
            if [[ "$url" == *"x86_64"* || "$url" == *"x86-64"* ]]; then arch="amd64";
            elif [[ "$url" == *"aarch64"* || "$url" == *"armv8"* ]]; then arch="arm64";
            else arch="arm"; fi
            
            curl -SL -o "${arch}-${{ matrix.name }}${ext}" "$url"
          done
          
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dpanel-build-resources
          files: artifacts/*
          make_latest: true

  # 任务 2：收集并构建母厂镜像
  build-and-push:
    needs: download-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download All from Release
        run: |
          mkdir -p toolchains-dir
          gh release download dpanel-build-resources --dir toolchains-dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Inline Dockerfile
        run: |
          cat <<EOF > Dockerfile.inline
          FROM alpine:latest AS unpacker
          RUN apk add --no-cache tar xz bzip2 bash binutils
          WORKDIR /opt/toolchains
          COPY toolchains-dir/ /tmp/artifacts/
          RUN /bin/bash -o pipefail -e -c ' \\
              for pkg in /tmp/artifacts/*; do \\
                  filename=\$(basename "\$pkg"); \\
                  [[ "\$filename" != *.tar.bz2 && "\$filename" != *.txz ]] && continue; \\
                  DIR=\$(echo "\$filename" | sed -E "s/\\.(tar\\.bz2|txz)$//"); \\
                  mkdir -p "\$DIR"; \\
                  [[ "\$filename" == *.bz2 ]] && OPT="-j" || OPT="-J"; \\
                  tar \${OPT}xf "\$pkg" -C "\$DIR" --strip-components=1; \\
                  rm -rf "\$DIR"/{share,doc,man,info}; \\
                  find "\$DIR/bin" "\$DIR/libexec" -type f -executable -exec strip --strip-unneeded {} + 2>/dev/null || true; \\
              done'

          FROM scratch
          # 自动化 COPY：将 unpacker 阶段所有解压后的目录按原样存入物理层
          # 为了保证 Selective Extraction 效果，建议此处显式列出核心目录
          COPY --from=unpacker /opt/toolchains/amd64-gnu-12.3  /opt/toolchains/amd64-gnu-12.3
          COPY --from=unpacker /opt/toolchains/arm64-gnu-12.3  /opt/toolchains/arm64-gnu-12.3
          COPY --from=unpacker /opt/toolchains/arm-gnu-12.3    /opt/toolchains/arm-gnu-12.3
          COPY --from=unpacker /opt/toolchains/amd64-gnu-13.2  /opt/toolchains/amd64-gnu-13.2
          COPY --from=unpacker /opt/toolchains/arm64-gnu-13.2  /opt/toolchains/arm64-gnu-13.2
          COPY --from=unpacker /opt/toolchains/arm-gnu-13.2    /opt/toolchains/arm-gnu-13.2
          COPY --from=unpacker /opt/toolchains/amd64-musl-12.3 /opt/toolchains/amd64-musl-12.3
          COPY --from=unpacker /opt/toolchains/arm64-musl-12.3 /opt/toolchains/arm64-musl-12.3
          COPY --from=unpacker /opt/toolchains/arm-musl-12.3   /opt/toolchains/arm-musl-12.3
          COPY --from=unpacker /opt/toolchains/amd64-musl-13.2 /opt/toolchains/amd64-musl-13.2
          COPY --from=unpacker /opt/toolchains/arm64-musl-13.2 /opt/toolchains/arm64-musl-13.2
          COPY --from=unpacker /opt/toolchains/arm-musl-13.2   /opt/toolchains/arm-musl-13.2
          COPY --from=unpacker /opt/toolchains/amd64-synology-7.1 /opt/toolchains/amd64-synology-7.1
          COPY --from=unpacker /opt/toolchains/arm64-synology-7.1 /opt/toolchains/arm64-synology-7.1
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.inline
          push: true
          tags: dpanel/builder:latest
