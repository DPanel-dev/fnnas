name: release

on:
  push:
    tags:
      - 'v*'  # 触发条件：推送到任意 v* 标签

permissions:
  contents: write  # 替代 write-all，更安全明确

jobs:
  build-fpk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pack
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          curl -L -o /usr/local/bin/fnpack https://github.com/donknap/dpanel/releases/download/docker-cli-v1/fnpack
          chmod +x /usr/local/bin/fnpack

          curl -L -o dpanel-amd64 https://github.com/donknap/dpanel/releases/download/${GITHUB_REF_NAME}/dpanel-ce-gnu-amd64 
          mkdir -p app/server
          cp dpanel-amd64 app/server/dpanel-amd64

          VERSION_TAG=${GITHUB_REF_NAME#v}
          sed -i "s/1.9.1/$VERSION_TAG/g" manifest

          fnpack build
          mv dpanel.fpk dpanel-amd64.fpk

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dpanel-amd64.fpk
          prerelease: false
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}
          path: dpanel-amd64.fpk
          if-no-files-found: error
  sync-to-dpanel-release:
    runs-on: ubuntu-latest
    needs: build-fpk
    permissions:
      contents: write
    steps:
      - name: Setup Workspace
        run: mkdir -p ./download

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.ref_name }}
          path: ./download

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Release and Sync to FnDepot
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # --- 0. 环境检查 ---
          echo "📂 检查下载目录内容:"
          ls -R ./download
          
          # --- 1. 上传到当前仓库 Release (原有逻辑) ---
          echo "📤 开始上传文件到 donknap/dpanel Release..."
          for filepath in ./download/*; do
            if [ -f "$filepath" ]; then
              filename=$(basename "$filepath")
              echo "⬆️ 上传中: $filename"
              gh release upload "$TAG_NAME" "$filepath" --repo donknap/dpanel --clobber
            fi
          done

          # --- 2. 同步到 FnDepot 仓库 ---
          echo "🚀 开始同步到 DPanel-dev/FnDepot..."
          
          # 配置 Git 身份
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 克隆目标仓库
          git clone https://x-access-token:${GH_TOKEN}@github.com/DPanel-dev/FnDepot.git fndepot_repo
          
          # 定义路径 (根据你的说明，源文件是 ./download/fnpack-amd64)
          SOURCE_FILE="./download/fnpack-amd64"
          TARGET_DIR="fndepot_repo/dpanel"

          if [ ! -f "$SOURCE_FILE" ]; then
            echo "❌ 错误: 找不到文件 $SOURCE_FILE"
            # 如果还是找不到，尝试在子目录寻找（预防 artifact 插件多包了一层）
            SOURCE_FILE=$(find ./download -name "fnpack-amd64" | head -n 1)
            if [ -z "$SOURCE_FILE" ]; then exit 1; fi
            echo "🔍 在子目录找到了文件: $SOURCE_FILE"
          fi

          # 执行拷贝和重命名
          mkdir -p "$TARGET_DIR"
          cp "$SOURCE_FILE" "$TARGET_DIR/dpanel.fpk"
          
          # 修改版本号 (1.9.3 -> TAG_NAME)
          JSON_FILE="$TARGET_DIR/fnpack.json"
          if [ -f "$JSON_FILE" ]; then
            sed -i "s/1.9.3/$TAG_NAME/g" "$JSON_FILE"
            echo "✅ 已更新 fnpack.json 版本为 $TAG_NAME"
          else
            echo "❌ 错误: 找不到 $JSON_FILE"
            exit 1
          fi

          # 提交推送
          cd fndepot_repo
          git add .
          if git diff --staged --quiet; then
            echo "ℹ️ 没有变化，跳过推送"
          else
            git commit -m "chore: update dpanel binary and version to $TAG_NAME"
            git push origin main
            echo "✅ 成功同步到 FnDepot 仓库"
          fi