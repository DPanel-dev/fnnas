name: release

on:
  push:
    tags:
      - 'v*'  # 触发条件：推送到任意 v* 标签

permissions:
  contents: write  # 替代 write-all，更安全明确

jobs:
  build-fpk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pack
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          curl -L -o /usr/local/bin/fnpack https://github.com/donknap/dpanel/releases/download/docker-cli-v1/fnpack
          chmod +x /usr/local/bin/fnpack

          curl -L -o dpanel-amd64 https://github.com/donknap/dpanel/releases/download/${GITHUB_REF_NAME}/dpanel-ce-gnu-amd64 
          mkdir -p app/server
          cp dpanel-amd64 app/server/dpanel-amd64

          VERSION_TAG=${GITHUB_REF_NAME#v}
          sed -i "s/1.9.1/$VERSION_TAG/g" manifest

          fnpack build
          mv dpanel.fpk dpanel-amd64.fpk

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dpanel-amd64.fpk
          prerelease: false
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}
          path: dpanel-amd64.fpk
          if-no-files-found: error
  sync-to-dpanel-release:
    runs-on: ubuntu-latest
    needs: build-fpk
    permissions:
      contents: write  # 允许操作 releases
    steps:
      - name: Setup Workspace
        run: |
          mkdir -p ./downloaded
          echo "📁 Created clean directory for artifact"
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.ref_name }}
          path: ./download
      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh
      - name: Upload to donknap/dpanel Release
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}  # 必须是 PAT，有 donknap/dpanel 写权限
        run: |
          ARTIFACT_DIR="download"
          
          if [ ! -d "$ARTIFACT_DIR" ]; then
            echo "❌ Directory '$ARTIFACT_DIR' not found!"
            exit 1
          fi

          if [ -z "$(ls -A $ARTIFACT_DIR)" ]; then
            echo "❌ No files found in '$ARTIFACT_DIR'!"
            exit 1
          fi

          TAG_NAME="${{ github.ref_name }}"

          echo "📤 Uploading files to https://github.com/donknap/dpanel/releases/tag/$TAG_NAME"

          for filepath in "$ARTIFACT_DIR"/*; do
            if [ -f "$filepath" ]; then
              filename=$(basename "$filepath")
              echo "⬆️ Uploading: $filename"
              gh release upload "$TAG_NAME" "$filepath" \
                --repo donknap/dpanel \
                --clobber \
                || (echo "❌ Failed to upload $filename" && exit 1)
            fi
          done

          echo "✅ All files uploaded successfully to donknap/dpanel@$TAG_NAME"