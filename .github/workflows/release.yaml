name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare Version Env
        id: prep
        run: |
          # 1. 移除开头的 v
          RAW_VER=${{ github.ref_name }}
          
          # 2. 统计点 (.) 的个数
          DOT_COUNT=$(echo "$RAW_VER" | tr -cd '.' | wc -c)
          
          # 3. 计算 VERSION_TAG: 如果是 4 段(eg: v1.9.3.1)，则将最后一个点换成 - (v1.9.3-1)
          if [ "$DOT_COUNT" -eq 3 ]; then
            VERSION_TAG="${RAW_VER%.*}-${RAW_VER##*.}"
          else
            VERSION_TAG="$RAW_VER"
          fi
          
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
          echo "🚀 Computed Version: $VERSION_TAG"

      - name: Pack
        run: |
          # 直接使用上一步存入 env 的 VERSION_TAG
          echo "Using Version: $VERSION_TAG"

          # 下载打包工具
          curl -L -o /usr/local/bin/fnpack https://github.com/DPanel-dev/actions/releases/download/build-toolchain/amd64-linux-fnpack
          chmod +x /usr/local/bin/fnpack

          # --- 1. 处理 amd64 ---
          echo "📦 Processing amd64..."
          curl -L -o dpanel-amd64 https://github.com/donknap/dpanel/releases/download/${{ github.ref_name }}/dpanel-ce-gnu-amd64 
          mkdir -p app/server
          cp dpanel-amd64 app/server/dpanel

          sed -i "s/#version/$VERSION_TAG/g" manifest
          sed -i "s/#os_min_version/1.1.8/g" manifest
          sed -i "s/#platform/x86/g" manifest

          fnpack build
          mv dpanel.fpk dpanel-amd64.fpk

          # --- 2. 处理 arm64 ---
          echo "📦 Processing arm64..."
          git checkout manifest # 恢复 manifest 模版
          
          curl -L -o dpanel-arm64 https://github.com/donknap/dpanel/releases/download/${{ github.ref_name }}/dpanel-ce-gnu-arm64 
          mkdir -p app/server
          cp dpanel-arm64 app/server/dpanel

          sed -i "s/#version/$VERSION_TAG/g" manifest
          sed -i "s/#os_min_version/1.0.0/g" manifest
          sed -i "s/#platform/arm/g" manifest

          fnpack build
          mv dpanel.fpk dpanel-arm64.fpk

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dpanel-amd64.fpk
            dpanel-arm64.fpk
          prerelease: false

      - name: Release and Sync to FnDepot
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # --- 1. 上传文件到当前仓库 Release ---
          echo "📤 上传文件到 donknap/dpanel Release..."
          gh release upload "$TAG_NAME" dpanel-amd64.fpk dpanel-arm64.fpk --repo donknap/dpanel --clobber

          # --- 2. 获取 Release Body (Changelog) ---
          echo "📄 获取 Release 更新日志..."
          CHANGELOG_CONTENT=$(gh release view "$TAG_NAME" --repo donknap/dpanel --json body -q .body || echo "暂无更新日志")

          # --- 3. 计算包体积 (MB) ---
          SIZE_MB=$(du -m dpanel-amd64.fpk | cut -f1)
          echo "📦 计算得到的包体积为: $SIZE_MB MB"

          # --- 4. 同步到 FnDepot 仓库 ---
          echo "🚀 同步到 DPanel-dev/FnDepot..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          REPO_DIR="./fndepot_repo"
          git clone https://x-access-token:${GH_TOKEN}@github.com/DPanel-dev/FnDepot.git ${REPO_DIR}

          JSON_FILE="${REPO_DIR}/fnpack.json"

          if [ -f "$JSON_FILE" ]; then
            # 此处直接使用全局变量 $VERSION_TAG
            jq --arg TAG "$TAG_NAME" \
               --arg SIZE "$SIZE_MB" \
               --arg VERSION "$VERSION_TAG" \
               --arg CHANGELOG "$CHANGELOG_CONTENT" \
               '.dpanel.version = $VERSION | 
                .dpanel.size = $SIZE | 
                .dpanel.changelog = $CHANGELOG | 
                .dpanel.arch_diff.x86.download_url = "https://github.com/donknap/dpanel/releases/download/\($TAG)/dpanel-amd64.fpk" | 
                .dpanel.arch_diff.arm.download_url = "https://github.com/donknap/dpanel/releases/download/\($TAG)/dpanel-arm64.fpk"' \
                "$JSON_FILE" > "$JSON_FILE.tmp" && mv "$JSON_FILE.tmp" "$JSON_FILE"
            echo "✅ 已成功解析并更新 $JSON_FILE"
          else
            echo "❌ 错误: 找不到 $JSON_FILE"
            exit 1
          fi

          # 提交推送
          cd $REPO_DIR
          git add .
          if git diff --staged --quiet; then
            echo "ℹ️ 内容无变化"
          else
            git commit -m "chore: update dpanel binary to $TAG_NAME, size $SIZE_MB"
            git push origin main
            echo "✅ 成功推送到 FnDepot"
          fi

  # ==============================
  # 上传 fpk 产物到 COS
  # ==============================
  upload-cos:
    needs: [build-and-sync]
    runs-on: ubuntu-latest
    steps:
      - name: Download fpk from Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p bin
          gh release download ${{ github.ref_name }} -D bin --repo ${{ github.repository }} --pattern '*.fpk'

      - name: Install coscli
        run: |
          wget -q https://cosbrowser.cloud.tencent.com/software/coscli/coscli-linux-amd64 -O coscli
          chmod +x coscli

      - name: Configure coscli
        env:
          COS_SECRET_ID: ${{ secrets.CDN_QCLOUD_COSV5_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.CDN_QCLOUD_COSV5_SECRET_KEY }}
        run: |
          cat > ~/.cos.yaml <<EOF
          cos:
            base:
              secretid: ${COS_SECRET_ID}
              secretkey: ${COS_SECRET_KEY}
          EOF

      - name: Upload fpk to COS
        run: |
          ls -lh bin
          ./coscli cp -e cos.ap-shanghai.myqcloud.com bin/ cos://we7cloud-10016060/dpanel/release/ -r --part-size 10 --routines 20
          echo "✅ fpk files uploaded to COS"