name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-sync: # 合并为一个任务，解决配额满的问题
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pack
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION_TAG=${GITHUB_REF_NAME#v}
          VERSION_TAG=${VERSION_TAG%.*}-${VERSION_TAG##*.}

          curl -L -o /usr/local/bin/fnpack https://github.com/donknap/dpanel/releases/download/docker-cli-v1/fnpack
          chmod +x /usr/local/bin/fnpack

          # amd64
          curl -L -o dpanel-amd64 https://github.com/donknap/dpanel/releases/download/${GITHUB_REF_NAME}/dpanel-ce-gnu-amd64 
          mkdir -p app/server
          cp dpanel-amd64 app/server/dpanel

          sed -i "s/#version/$VERSION_TAG/g" manifest
          sed -i "s/#os_min_version/1.1.8/g" manifest
          sed -i "s/#platform/x86/g" manifest

          fnpack build
          mv dpanel.fpk dpanel-amd64.fpk

          # arm64 
          git checkout manifest
          
          curl -L -o dpanel-arm64 https://github.com/donknap/dpanel/releases/download/${GITHUB_REF_NAME}/dpanel-ce-gnu-arm64 
          mkdir -p app/server
          cp dpanel-arm64 app/server/dpanel

          sed -i "s/#version/$VERSION_TAG/g" manifest
          sed -i "s/#os_min_version/1.0.0/g" manifest
          sed -i "s/#platform/arm/g" manifest

          fnpack build
          mv dpanel.fpk dpanel-arm64.fpk

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dpanel-amd64.fpk
            dpanel-arm64.fpk
          prerelease: false

      - name: Release and Sync to FnDepot
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          # --- 1. 上传到当前仓库 Release ---
          # 合并后文件就在当前目录，直接上传
          echo "📤 上传文件到 donknap/dpanel Release..."
          gh release upload "$TAG_NAME" dpanel-amd64.fpk dpanel-arm64.fpk --repo donknap/dpanel --clobber

          # --- 获取 Release Body (Changelog) ---
          echo "📄 获取 Release 更新日志..."
          # 使用 gh 命令行工具获取 release 描述，如果获取失败则提供默认文本
          CHANGELOG_CONTENT=$(gh release view "$TAG_NAME" --repo donknap/dpanel --json body -q .body || echo "暂无更新日志")

          # --- 计算包体积 (MB) ---
          # 获取 amd64 包的体积作为基准大小
          SIZE_MB=$(du -m dpanel-amd64.fpk | cut -f1)
          echo "📦 计算得到的包体积为: $SIZE_MB MB"

          # --- 2. 同步到 FnDepot 仓库 ---
          echo "🚀 同步到 DPanel-dev/FnDepot..."
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          REPO_DIR="./fndepot_repo"
          git clone https://x-access-token:${GH_TOKEN}@github.com/DPanel-dev/FnDepot.git ${REPO_DIR}
          
          # 拷贝文件，注意目标文件名按你的新规则已修改为 _x86 和 _arm
          cp "dpanel-amd64.fpk" "${REPO_DIR}/dpanel/dpanel_x86.fpk"
          cp "dpanel-arm64.fpk" "${REPO_DIR}/dpanel/dpanel_arm.fpk"

          echo "✅ 已更新 dpanel 二进制包"

          # --- 修改版本号、大小及 changelog ---
          JSON_FILE="${REPO_DIR}/fnpack.json"

          if [ -f "$JSON_FILE" ]; then
            jq --arg TAG "$TAG_NAME" \
               --arg SIZE "$SIZE_MB" \
               --arg CHANGELOG "$CHANGELOG_CONTENT" \
               '.dpanel.version = $TAG | .dpanel.size = $SIZE | .dpanel.changelog = $CHANGELOG' \
               "$JSON_FILE" > "$JSON_FILE.tmp" && mv "$JSON_FILE.tmp" "$JSON_FILE"
            echo "✅ 已成功解析并更新 $JSON_FILE"
          else
            echo "❌ 错误: 找不到 $JSON_FILE"
            exit 1
          fi

          # 提交推送
          cd $REPO_DIR
          git add .
          if git diff --staged --quiet; then
            echo "ℹ️ 内容无变化"
          else
            # 在 commit 信息里也顺便体现一下体积
            git commit -m "chore: update dpanel binary to $TAG_NAME, size $SIZE_MB"
            git push origin main
            echo "✅ 成功推送到 FnDepot"
          fi