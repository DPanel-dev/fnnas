name: release

on:
  push:
    tags:
      - 'v*'  # 触发条件：推送到任意 v* 标签

permissions:
  contents: write  # 替代 write-all，更安全明确

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download fnpack and dpanel binary
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          curl -L -o /usr/local/bin/fnpack https://github.com/donknap/dpanel/releases/download/docker-cli-v1/fnpack
          chmod +x /usr/local/bin/fnpack
          curl -L -o dpanel-amd64 https://github.com/donknap/dpanel/releases/download/${GITHUB_REF_NAME}/dpanel-amd64
          mkdir -p app/server
          cp dpanel-amd64 app/server/dpanel-amd64

      - name: Build fpk
        run: |
          fnpack build

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dpanel-amd64.fpk
          prerelease: false