name: release

on:
  push:
    tags:
      - 'v*'  # 触发条件：推送到任意 v* 标签

permissions:
  contents: write  # 替代 write-all，更安全明确

jobs:
  build-fpk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pack
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          curl -L -o /usr/local/bin/fnpack https://github.com/donknap/dpanel/releases/download/docker-cli-v1/fnpack
          chmod +x /usr/local/bin/fnpack

          # amd64
          curl -L -o dpanel-amd64 https://github.com/donknap/dpanel/releases/download/${GITHUB_REF_NAME}/dpanel-ce-gnu-amd64 
          mkdir -p app/server
          cp dpanel-amd64 app/server/dpanel

          VERSION_TAG=${GITHUB_REF_NAME#v}
          sed -i "s/1.9.1/$VERSION_TAG/g" manifest

          fnpack build
          mv dpanel.fpk dpanel-amd64.fpk

          # arm64 
          curl -L -o dpanel-arm64 https://github.com/donknap/dpanel/releases/download/${GITHUB_REF_NAME}/dpanel-ce-gnu-arm64 
          mkdir -p app/server
          cp dpanel-arm64 app/server/dpanel

          fnpack build
          mv dpanel.fpk dpanel-arm64.fpk

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dpanel-amd64.fpk
            dpanel-arm64.fpk
          prerelease: false
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.ref_name }}
          path: |
            dpanel-amd64.fpk
            dpanel-arm64.fpk
          if-no-files-found: error
  sync-to-dpanel-release:
    runs-on: ubuntu-latest
    needs: build-fpk
    permissions:
      contents: write
    steps:
      - name: Setup Workspace
        run: mkdir -p ./download

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ github.ref_name }}
          path: ./download

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Release and Sync to FnDepot
        env:
          GH_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION_TAG=${GITHUB_REF_NAME#v}
          # --- 1. 上传到当前仓库 Release ---
          echo "📤 上传文件到 donknap/dpanel Release..."
          for filepath in ./download/*; do
            if [ -f "$filepath" ]; then
              filename=$(basename "$filepath")
              echo "⬆️ 上传中: $filename"
              gh release upload "$TAG_NAME" "$filepath" --repo donknap/dpanel --clobber
            fi
          done

          # --- 2. 同步到 FnDepot 仓库 ---
          echo "🚀 同步到 DPanel-dev/FnDepot..."
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          REPO_DIR="./fndepot_repo"
          git clone https://x-access-token:${GH_TOKEN}@github.com/DPanel-dev/FnDepot.git ${REPO_DIR}
          
          cp "./download/dpanel-amd64.fpk" "${REPO_DIR}/dpanel/dpanel.fpk"
          echo "✅ 已更新 dpanel.fpk"

          # --- 修改版本号与历史记录 (使用 jq 解析) ---
          JSON_FILE="${REPO_DIR}/fnpack.json"

          if [ -f "$JSON_FILE" ]; then
            # 使用 jq 进行处理：
            # 1. 修改 .dpanel.version
            # 2. 修改 .dpanel.history，添加以变量为 Key 的新项
            # 注意：这里我们使用 --arg 传参，避免转义问题
            
            jq --arg TAG "$TAG_NAME" \
              --arg DESC "更新日志: https://github.com/donknap/dpanel/releases/tag/$TAG_NAME" \
              '.dpanel.version = $TAG | .dpanel.history += { ($TAG): $DESC }' \
              "$JSON_FILE" > "$JSON_FILE.tmp" && mv "$JSON_FILE.tmp" "$JSON_FILE"

            echo "✅ 已成功解析并更新 $JSON_FILE"
          else
            echo "❌ 错误: 找不到 $JSON_FILE"
            exit 1
          fi

          # 提交推送
          cd fndepot_repo
          git add .
          if git diff --staged --quiet; then
            echo "ℹ️ 内容无变化"
          else
            git commit -m "chore: update dpanel binary to $TAG_NAME"
            git push origin main
            echo "✅ 成功推送到 FnDepot"
          fi